<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AINTERCOM LIVE — Connexion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#2563EB; --accent2:#1D4ED8; --accent-glow:rgba(37,99,235,.15);
  --success:#16A34A;
  --bg:#07090E; --bg2:#0E1117; --bg3:#151A23;
  --border:#1E2535;
  --tx:#E8EDF5; --tx2:#8B96A8; --tx3:#4A5568;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:10px; --r-sm:6px; --r-lg:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}

.page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;overflow:hidden}

/* Ambient glow */
.page::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(37,99,235,.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none}

.box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:48px 44px;width:100%;max-width:420px;text-align:center;position:relative;z-index:1}

.logo{font-size:26px;font-weight:900;letter-spacing:-.5px;color:var(--accent);margin-bottom:6px}
.logo span{color:var(--tx)}
.tagline{font-size:11px;color:var(--tx3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:40px}

.divider{display:flex;align-items:center;gap:12px;margin:24px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:10px;color:var(--tx3);font-weight:600;letter-spacing:.1em;text-transform:uppercase}

.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 20px;background:#fff;color:#1F2328;border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s ease;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.btn-google:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn-google:active{transform:translateY(0)}
.btn-google:disabled{opacity:.6;cursor:not-allowed;transform:none}

.spinner{display:none;width:20px;height:20px;border:2px solid rgba(37,99,235,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

.loading-state{display:none;flex-direction:column;align-items:center;gap:12px;padding:16px 0}
.loading-state .spinner{display:block}
.loading-text{font-size:13px;color:var(--tx2)}

.error{display:none;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.3);border-radius:var(--r-sm);padding:12px 14px;margin-top:16px;color:#FCA5A5;font-size:12px;text-align:left}

.local-btn{background:transparent;border:none;font-size:11px;color:var(--tx3);cursor:pointer;font-family:var(--font);text-decoration:underline;text-underline-offset:2px;margin-top:20px;display:block;width:100%;text-align:center;transition:color .15s}
.local-btn:hover{color:var(--tx2)}

.footer-note{margin-top:32px;font-size:10px;color:var(--tx3);line-height:1.6}
.footer-note a{color:var(--accent);text-decoration:none}

/* Success state */
.success-state{display:none;flex-direction:column;align-items:center;gap:12px;padding:16px 0}
.success-icon{width:48px;height:48px;background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
.success-text{font-size:13px;color:var(--tx2)}
</style>
</head>
<body>
<div class="page">
  <div class="box">
    <div class="logo">AINTERCOM <span>LIVE</span></div>
    <div class="tagline">Event Control OS</div>

    <div id="main-content">
      <button class="btn-google" id="google-btn" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M47.5 24.6c0-1.6-.1-3.1-.4-4.6H24v8.7h13.1c-.6 3-2.4 5.5-5 7.2v6h8c4.7-4.3 7.4-10.7 7.4-17.3z"/>
          <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-8-6c-2.1 1.4-4.8 2.2-7.9 2.2-6.1 0-11.2-4.1-13-9.6H2.7v6.2C6.7 42.9 14.8 48 24 48z"/>
          <path fill="#FBBC05" d="M11 28.8c-.5-1.4-.7-2.9-.7-4.4s.3-3 .7-4.4v-6.2H2.7C1 17.1 0 20.4 0 24s1 6.9 2.7 9.9l8.3-5.1z"/>
          <path fill="#EA4335" d="M24 9.5c3.4 0 6.5 1.2 8.9 3.5l6.7-6.7C35.9 2.4 30.5 0 24 0 14.8 0 6.7 5.1 2.7 12.6l8.3 5.1C12.8 13.6 17.9 9.5 24 9.5z"/>
        </svg>
        Continuer avec Google
      </button>

      <div class="error" id="error-box"></div>

      <div class="divider"><span>ou</span></div>
      <button class="local-btn" onclick="continueLocal()">Continuer sans connexion (mode local)</button>
    </div>

    <div class="loading-state" id="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Connexion en cours…</div>
    </div>

    <div class="success-state" id="success-state">
      <div class="success-icon">✓</div>
      <div class="success-text">Connecté — redirection…</div>
    </div>

    <div class="footer-note">
      En continuant, vous acceptez les <a href="#">conditions d'utilisation</a>.<br>
      Vos données sont chiffrées et isolées par compte.
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wmbyccbyhtjzvsxxrsbe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtYnljY2J5aHRqenZzeHhyc2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3OTc0NDQsImV4cCI6MjA5MDM3MzQ0NH0.Pb3C36m05SygQcEhidH4fHXJHMvMw2XN7g5iCFkBGaM';

let sb = null;

function initSB() {
  if (sb) return sb;
  try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); return sb; }
  catch(e) { console.error('Supabase init:', e); return null; }
}

function showLoading() {
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('loading-state').style.display = 'flex';
  document.getElementById('success-state').style.display = 'none';
}

function showSuccess() {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('success-state').style.display = 'flex';
}

function showMain(errMsg) {
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('success-state').style.display = 'none';
  if (errMsg) {
    const box = document.getElementById('error-box');
    box.textContent = errMsg;
    box.style.display = 'block';
  }
}

async function signInWithGoogle() {
  const client = initSB();
  if (!client) { showMain('Erreur de configuration. Contactez le support.'); return; }
  showLoading();
  const { error } = await client.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://live.aintercom.fr/index.html' }
  });
  if (error) showMain('Erreur Google : ' + error.message);
}

function continueLocal() {
  // Stocker un user local fictif avec un ID stable par navigateur
  let localId = localStorage.getItem('aintercom_local_id');
  if (!localId) {
    localId = 'local_' + Math.random().toString(36).slice(2);
    localStorage.setItem('aintercom_local_id', localId);
  }
  const localUser = { id: localId, email: 'local@aintercom', name: 'Mode local', isLocal: true };
  localStorage.setItem('aintercom_session', JSON.stringify(localUser));
  window.location.href = 'index.html';
}

// Vérifier si déjà connecté au chargement
document.addEventListener('DOMContentLoaded', async () => {
  const client = initSB();
  if (!client) return;

  showLoading();

  try {
    const { data: { session } } = await client.auth.getSession();
    if (session?.user) {
      // Déjà connecté → redirect direct
      showSuccess();
      setTimeout(() => { window.location.href = 'index.html'; }, 600);
    } else {
      showMain();
    }
  } catch(e) {
    showMain();
  }
});
</script>
</body>
</html>
